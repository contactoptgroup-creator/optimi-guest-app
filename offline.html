<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0b">
    <title>Hors ligne | OPT IM GROUP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0b;
            color: #f4f4f5;
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 14px; color: #a1a1aa; max-width: 300px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ff6b35;
            color: #0a0a0b;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .emergency {
            margin-top: 40px;
            padding: 20px;
            background: rgba(239, 71, 111, 0.1);
            border: 1px solid rgba(239, 71, 111, 0.3);
            border-radius: 16px;
            max-width: 300px;
        }
        .emergency-title {
            font-size: 14px;
            font-weight: 700;
            color: #ef476f;
            margin-bottom: 12px;
        }
        .emergency-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
        }
        .emergency-number {
            font-weight: 600;
            color: #f4f4f5;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Pas de connexion internet disponible. Vérifiez votre connexion WiFi ou données mobiles.</p>
    <button class="btn" onclick="location.reload()">
        <span>Réessayer</span>
        <span>↻</span>
    </button>

    <div class="emergency">
        <div class="emergency-title">🚨 Numéros d'urgence</div>
        <div class="emergency-item">
            <span>SAMU</span>
            <a href="tel:15" class="emergency-number">15</a>
        </div>
        <div class="emergency-item">
            <span>Police</span>
            <a href="tel:17" class="emergency-number">17</a>
        </div>
        <div class="emergency-item">
            <span>Pompiers</span>
            <a href="tel:18" class="emergency-number">18</a>
        </div>
        <div class="emergency-item">
            <span>Conciergerie</span>
            <a href="tel:+33612784932" class="emergency-number">06 12 78 49 32</a>
        </div>
    </div>
</body>
</html>
